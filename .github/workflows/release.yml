name: Release

# Push a semver tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# all one-click-install artifacts and publish a GitHub Release with them attached.
# `workflow_dispatch` runs the same build for testing but does NOT publish a release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .dxt and .ccx
        run: python scripts/build_release.py "${{ steps.ver.outputs.version }}"

      - name: Build proxy executables (win + macOS)
        working-directory: adb-proxy-socket
        run: |
          npm ci --no-audit --no-fund
          npx -y pkg@5.8.1 . --out-path ../dist

      - name: List artifacts
        run: ls -la dist/

      - name: Upload workflow artifacts (non-release runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: adb-mcp-artifacts
          path: dist/*

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: adb-mcp ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/photoshop-mcp.dxt
            dist/photoshop-mcp-plugin.ccx
            dist/indesign-mcp.dxt
            dist/indesign-mcp-plugin.ccx
            dist/premiere-mcp.dxt
            dist/premiere-mcp-plugin.ccx
            dist/adb-proxy-socket-win-x64.exe
            dist/adb-proxy-socket-macos-x64
            dist/adb-proxy-socket-macos-arm64
